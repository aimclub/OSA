site_name: Open-Source-Advisor
theme:
  name: material
  features:
  - navigation.top  
  - navigation.footer
  - navigation.tabs 
  - toc.integrate 

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/osa_helpdesk
    - icon: fontawesome/brands/github
      link: https://github.com/aimclub/OSA

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_object_full_path: false

nav:
  - Home: index.md
  - FAQ:
      - Overview: faq/index.md
      - General Questions: faq/general-questions.md
      - Installation & Setup: faq/installation-setup.md
      - Configuration & API Keys: faq/configuration-api-keys.md
      - Usage & Features: faq/usage-features.md
      - Troubleshooting: faq/troubleshooting.md
      - Contributing & Community: faq/contributing-community.md
      - Technical Details: faq/technical-details.md
  - Scheduler: scheduler/index.md
  - Workflow Generator: workflow-generator/index.md
  - API Reference:
      - Git Agent: core/git_agent/git_agent.md
      - Model Handler: core/llm/lmm.md
      - OSA Tree Sitter:
          - core/osatreesitter/osatreesitter.md
          - Documentation Generator: core/osatreesitter/docgen.md

repo_url: https://github.com/aimclub/OSA

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aimclub/OSA

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: True
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - pymdownx.snippets