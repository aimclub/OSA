[prompts]

analyze_code_file = """
INPUT DATA:
{file_content}

TASK:
Analyze the attached Python source code file and extract the following information:

1. For each class defined in the file:
   - Class name
   - Its docstring (if present; otherwise an empty string "")
   - A brief description of what the class does (inferred from code if no docstring)
2. For each top-level function defined in the file:
   - Function name
   - List of input argument names (as a list of strings)
   - Return type or description of what it returns (if unclear, write "Not specified")
   - Its docstring (if present; otherwise an empty string "")
   - A brief description of what the function does
3. Provide a high-level description of what the entire file does.

RULES:
- Do NOT include any text outside the JSON object.
- Ensure the output is valid JSON.
- If there are no classes or functions, use empty objects: {{}}.

OUTPUT FORMAT:
Return a valid JSON object with the following structure:

{{
  "filename": "string",
  "description": "string",
  "classes": {{
    "ClassName1": {{
      "docstring": "string or empty",
      "description": "string"}}
    }},
    ...
  }},
  "functions": {{
    "function_name1": {{
      "arguments": ["arg1", "arg2", ...],
      "returns": "description of return value",
      "docstring": "string or empty",
      "description": "string"
    }},
    ...
  }}
}}
"""

extract_paper_experiments_list = """
INPUT DATA:
{paper_content}

TASK:
1. Identify the section(s) of the paper describing experiments (titles may include "Experiments", "Experimental Setup", "Methodology", "Materials and Methods", or similar), but don't rely solely on titles.
2. From that text, list each explicitly described experiment in the order presented, using a direct description from the text. An experiment is a procedure carried out to support or refute a hypothesis, or determine the efficacy or likelihood of something previously untried.
3. Experiment descriptions should be extracted with the exact wording as given in the original paper.
4. Experiments have to be described clearly, so it would be possible to tell wheather or not this experiment can be reproduced with code.
5. Replace ONLY non-askii characters with its askii variant.

RULES:
- Return ONLY a valid JSON object with no additional text, explanations, or formatting.
- If no experiment section exists, return {{"experiment_list": []}}.
- Do not paraphrase, infer, or add any content not present in the input.
- Do NOT include section titles unless they appear in the original text.

OUTPUT FORMAT:
Return a valid JSON object with the following structure:
{{
  "experiment_list": ["string", "string"]
}}
"""

validate_single_experiment = """
INPUT DATA:
{experiment_description}

{code_files_info}

TASK:
For provided experiment description assess how much of the proposed experiment is actually present in the code base and exactly where in the code such experiment is implemented and return a valid JSON object with following structure
{{
  "implemented_in": "list of exact file paths and function/class names where experiment logic is found",
  "missing_critical_components": "list of key elements from description absent in code",
  "correlation_percent": float in range from 0.0 to 1.0 with your estimation of how much the code correlates with the provided experiment description.
}}

RULES:
- Return ONLY a valid JSON object with no additional text, explanations, or formatting.
- "correlation_percent": Float between 0.0 and 1.0 representing your estimate of implementation completeness (0=not implemented, 0.5=partially implemented, 1=fully implemented)
- Consider partial implementations (e.g., model implemented but training loop missing = ~0.3-0.4). If something is missing, explain why it is crucial to have it.
- "implemented_in": MUST contain exact locations like "train.py:train_sar_model()" or "NOT IMPLEMENTED"
- "missing_critical_components": list ONLY critical missing parts that prevent experiment reproduction
- DO NOT use vague terms like "pipeline", "includes preprocessing", "visualization" without naming exact files/functions.
- MUST specify: filename.py:function_name() or filename.py:lines X-Y for each implemented component.
- If component not found → state "NOT FOUND" explicitly.

Use the following as an example:
{{
  "implemented_in": [
    "models/sar_predictor.py:train_sar_model()",
    "data/preprocessing.py:extract_11_descriptors()"
  ],
  "missing_critical_components": [
    "Relaxivity prediction with 8 descriptors (no implementation found)",
    "Explicit descriptor count validation in training loop"
  ],
  "correlation_percent": 0.65
}}

OUTPUT FORMAT:
Return a valid JSON obect with the following structure:
{{
  "implemented_in": list[string],
  "missing_critical_components": list[string],
  "correlation_percent": float
}}
"""

validate_single_experiment_preprocessed = """
INPUT DATA:
Experiment description:
{experiment_description}

The following code snippets were retrieved as the most relevant parts of the repository:
{code_snippets}

TASK:
For provided experiment description assess how much of the proposed experiment is actually present in the code snippets and exactly where in the code such experiment is implemented and return a valid JSON object with following structure
{{
  "implemented_in": "list of exact file paths and function/class names where experiment logic is found",
  "reasoning": "descriprion of what exactly was implemented",
  "missing_critical_components": "list of key elements from description absent in code",
  "correlation_percent": float in range from 0.0 to 1.0 with your estimation of how much the code correlates with the provided experiment description.
}}

RULES:
- Return ONLY a valid JSON object with no additional text, explanations, or formatting.
- "correlation_percent": A confidence score between 0.0 and 1.0 indicating whether this experiment is implemented (0=not implemented, 0.5=partially implemented, 1=fully implemented)
- Consider partial implementations (e.g., model implemented but training loop missing = ~0.3-0.4). If something is missing, explain why it is crucial to have it.
- "implemented_in": MUST contain exact locations like "train.py:train_sar_model()" or "NOT IMPLEMENTED"
- "reasoning": must be extreamly specific on what's actually present in the code which corresponds with the wording of the experiment.
- "missing_critical_components": list ONLY critical missing parts that prevent experiment reproduction

Use the following as an example:
{{
  "implemented_in": [
    "models/sar_predictor.py:train_sar_model()",
    "data/preprocessing.py:extract_11_descriptors()"
  ],
  "reasoning": "The requirement specifies training separate SAR and relaxivity models using 11 and 8 descriptors respectively",
  "missing_critical_components": [
    "Relaxivity prediction with 8 descriptors (no implementation found)",
    "Explicit descriptor count validation in training loop"
  ],
  "correlation_percent": 0.65
}}

OUTPUT FORMAT:
Return a valid JSON obect with the following structure:
{{
  "implemented_in": list[string],
  "reasoning": string,
  "missing_critical_components": list[string],
  "correlation_percent": float
}}
"""
