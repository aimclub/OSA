# LLM prompts for the README generation agent pipeline.

[prompts]
repo_analysis = """
TASK:
Analyze the repository and produce a structured assessment of its characteristics.

Based on the repository tree, key files, and existing README, determine:
1. **Project type**: ML/AI, CLI tool, library/SDK, web app, data pipeline, or other
2. **Tech stack**: primary language(s), frameworks, key dependencies
3. **Architecture**: monolith, microservices, plugin-based, notebook-based, etc.
4. **Quality signals**: presence of tests, CI/CD, documentation, examples, type hints
5. **Target audience**: researchers, developers, data scientists, end-users

Produce a concise but complete analysis covering all five points above.

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

INPUT DATA:

1. REPOSITORY TREE:

{repository_tree}

2. KEY FILES CONTENT:

{key_files_content}

3. EXISTING README:

{existing_readme}
"""

readme_analysis = """
TASK:
Evaluate the quality of the existing README for this repository.

Assess the following dimensions:
1. **Completeness**: which standard sections exist (overview, installation, usage/getting started, examples, API reference, contributing, license) and which are missing
2. **Accuracy**: does the README reflect the current state of the code (outdated commands, wrong dependencies, etc.)
3. **Clarity**: is the writing clear, well-structured, and beginner-friendly
4. **Section quality**: for each existing section, rate quality as good/adequate/poor
5. **Gaps**: specific improvements that would have the highest impact

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

INPUT DATA:

1. EXISTING README:

{existing_readme}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. REPOSITORY TREE:

{repository_tree}
"""

article_analysis = """
TASK:
Analyze the scientific article (PDF) associated with this repository.

Extract and summarize:
1. **Main contributions**: what novel methods, datasets, or findings does the paper present
2. **Methodology**: key algorithms, experimental setup, evaluation approach
3. **Results**: primary findings and their significance
4. **Code connection**: how well the repository reflects or implements the paper's methodology

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

INPUT DATA:

1. PDF CONTENT:

{pdf_content}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. EXISTING README:

{existing_readme}
"""

self_eval = """
TASK:
Evaluate the quality of the generated README below.

Score the README on a scale of 1-10 based on:
- Completeness: does it cover all essential sections
- Accuracy: does it reflect the repository correctly
- Clarity: is it well-written and easy to follow
- Structure: proper markdown formatting, logical flow
- User request alignment: does it address what the user asked for (if applicable)

OUTPUT:
Return a JSON object:

{{
    "score": 8.5,
    "issues": ["issue 1 description", "issue 2 description"],
    "should_stop": true
}}

Set "should_stop" to true if the README is good enough (score >= 8) or if remaining issues are minor.

INPUT DATA:

1. GENERATED README:

{readme}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. GENERATION PLAN:

{generation_plan}

4. USER REQUEST (if any):

{user_request}

5. PREVIOUS ISSUES (if any):

{previous_issues}
"""

refine_with_feedback = """
TASK:
Improve the README based on the specific issues identified during evaluation.

Fix each issue while preserving the overall structure and content that is already good.
Do not rewrite from scratch; make targeted improvements.

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

INPUT DATA:

1. CURRENT README:

{readme}

2. ISSUES TO FIX:

{issues}

3. GENERATION PLAN:

{generation_plan}

4. USER REQUEST (if any):

{user_request}
"""

intent_analysis = """
TASK:
Analyze the user's request and repository state to determine the intent for README generation.

Based on the inputs below, determine:
1. **task_type**: one of "generate", "improve", or "update"
   - "generate": No README exists, or user asks for a fresh README from scratch
   - "improve": README exists and user wants to enhance it globally (better quality, more sections, etc.)
   - "update": User requests changes to specific sections only
2. **scope**: "full" or "partial"
   - "full": Entire README should be (re)generated or improved
   - "partial": Only specific sections should be modified
3. **affected_sections**: list of section names the user explicitly or implicitly refers to (empty list for full scope)
   - Use descriptive names like "overview", "installation", "getting_started", "api_reference", "benchmarks", etc.
4. **incorporate_paper**: true if a scientific paper/PDF is attached AND relevant to the README
5. **reasoning**: brief explanation of your decision

OUTPUT:
Return a JSON object:

{{
    "task_type": "generate",
    "scope": "full",
    "affected_sections": [],
    "incorporate_paper": false,
    "reasoning": "text"
}}

INPUT DATA:

1. REPOSITORY ANALYSIS:

{repo_analysis}

2. README ANALYSIS:

{readme_analysis}

3. ARTICLE ANALYSIS (if available):

{article_analysis}

4. USER REQUEST (if any):

{user_request}

5. HAS EXISTING README: {has_existing_readme}

6. HAS ATTACHMENT: {has_attachment}
"""

section_planning = """
TASK:
Plan which LLM-written sections the README still needs (a small set — not a textbook).

The pipeline already adds deterministically: header, table of contents, installation, examples, documentation,
contributing, license, and citation when applicable. Your list must contain ONLY extra sections that still
require prose from the LLM (typically 3–6 items; rarely more than 7).

Each section needs: snake_case name, display title, one-line description, and prompt_context_keys.

RULES (read carefully):
- Prefer a SHORT README: fewer sections beat exhaustive coverage.
- Do NOT mirror every bullet from README ANALYSIS or any "gaps / recommendations" list as separate sections.
  Those notes are hints for improving accuracy, not a mandatory checklist.
- Avoid overlap: use EITHER "getting_started" OR "usage", not both (prefer getting_started for runnable entry).
- Do NOT add "notebook_usage", "data_requirements", or "architecture" unless the repo is large or clearly needs them.
- Do NOT add "faq", "troubleshooting", or "changelog" unless the user request explicitly asks for them.
- Do NOT add "benchmarks" or tables of metrics unless the repository context actually contains measured numbers
  to cite (e.g. logged results, benchmark outputs, or explicit figures in the provided file extracts).
- Do NOT add "testing" if there is no tests/ suite, CI config, or test files in the repository analysis/tree.
- Tailor to the repo: a few scripts and notebooks rarely need API reference, architecture, or FAQ.
- Do NOT include sections that duplicate deterministic blocks (installation, license, citation, contributing links).
- Do NOT include "header" or "table_of_contents" — those are generated automatically.
- If a scientific paper is attached and relevant, you may add methodology-focused sections (e.g. algorithms).
- Custom section names are allowed only when they avoid duplicating topics already covered above.

OUTPUT:
Return a JSON object:

{{
    "sections": [
        {{
            "name": "overview",
            "title": "Overview",
            "description": "High-level project description covering purpose, key capabilities, and target audience",
            "prompt_context_keys": ["repo_analysis", "readme_analysis"]
        }},
        {{
            "name": "core_features",
            "title": "Core Features",
            "description": "List of main features with brief explanations",
            "prompt_context_keys": ["repo_analysis", "key_files_content"]
        }}
    ]
}}

For each section, "prompt_context_keys" lists which context fields should be included when generating that section.
Valid keys: "repo_tree", "existing_readme", "key_files_content", "examples_content", "pdf_content", "repo_analysis", "readme_analysis", "article_analysis"

INPUT DATA:

1. TASK TYPE: {task_type}
2. SCOPE: {scope}
3. AFFECTED SECTIONS: {affected_sections}
4. INCORPORATE PAPER: {incorporate_paper}

5. REPOSITORY ANALYSIS:

{repo_analysis}

6. README ANALYSIS:

{readme_analysis}

7. ARTICLE ANALYSIS (if available):

{article_analysis}

8. USER REQUEST (if any):

{user_request}

9. EXISTING README SECTIONS (extracted headings):

{existing_sections}
"""

section_generate = """
TASK:
Generate the "{section_title}" section for a README file.

SECTION INTERNAL NAME (use for constraints below): {section_name}

SECTION PURPOSE:
{section_description}

RULES:
- Facts only: describe what exists in the repository context (files, scripts, notebooks, commands that appear
  in the snippets). Do NOT invent CLI flags, paths, filenames, package names, hyperparameters, benchmark numbers,
  or FAQ answers that are not supported by the context.
- If a detail is unknown, omit it or say briefly that users should inspect the listed files — do not guess.
- Write lean Markdown. Do NOT include the section heading (no "## {section_title}") — it is added automatically.
- Do NOT add a nested "FAQ" inside non-FAQ sections.
- Escape any backslashes in JSON strings so the output is valid JSON (double backslashes for Windows paths).
- If improving an existing section, keep accurate facts; drop marketing filler and speculative claims.

SECTION-SPECIFIC CONSTRAINTS (apply when section internal name matches):
- overview: 1–3 short paragraphs only. No bullet lists. Do NOT enumerate libraries or dependencies by name; you may
  say "Python" once or refer readers to Installation / requirements. Focus on what the repo does and name real
  entry-point files from the context.
- core_features: at most 5 bullets. Each bullet must cite at least one concrete file name or function/class symbol
  visible in the context. Do NOT add bullets that only restate the dependency stack, IDE tooling, type hints,
  "clean code", "rich libraries", persistence alone, or other generic claims without a specific repo artifact.
- getting_started: keep prerequisites short; do not paste a long package list—point to Installation or
  requirements.txt if mentioned in context.

OUTPUT:
Return a JSON object:

{{
    "text": "the section body only, in Markdown"
}}

INPUT DATA:

1. PROJECT NAME: {project_name}

2. REPOSITORY CONTEXT:

{context_block}

3. EXISTING SECTION CONTENT (if improving):

{existing_section}

4. USER REQUEST (if any):

{user_request}
"""

section_merge = """
TASK:
Merge newly generated sections into the existing README.

You have an existing README and one or more newly generated sections.
Your job is to produce a coherent, unified README by:
1. Replacing the corresponding sections in the existing README with the new versions
2. Ensuring smooth transitions between sections
3. Preserving sections that were NOT regenerated
4. Maintaining consistent formatting and tone throughout

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

INPUT DATA:

1. EXISTING README:

{existing_readme}

2. NEWLY GENERATED SECTIONS:

{new_sections}

3. SECTIONS BEING REPLACED:

{target_sections}

4. GENERATION PLAN:

{generation_plan}
"""
