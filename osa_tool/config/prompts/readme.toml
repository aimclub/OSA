# LLM prompts for README-related generation tasks (legacy helpers still used outside readme_generation).

[prompts]
preanalysis = """
TASK:
Based on the repository file tree and README, identify the 4-8 most important files
for understanding the project’s purpose, architecture, and usage.

Return files in PRIORITY ORDER — the first file should be the single most important
file for understanding the project. Prioritize:
1. Entry points (main.py, app.py, cli.py, __main__.py)
2. Core module files containing primary business logic
3. Configuration/setup files (setup.py, pyproject.toml, Cargo.toml, package.json)
4. Example/demo files that show usage

OUTPUT:
Return a JSON object:

{{
    "key_files": [
        "most/important/file.py",
        "second/important/file.py"
    ]
}}

RULES:
- Return 4-8 files, ordered by importance (most important first).
- Each string is a relative path exactly matching a path in the tree.
- Exclude test files, CI configs, and README files.
- Return only valid JSON without explanations.

INPUT DATA:

1. REPOSITORY FILE TREE:

{repository_tree}

2. README CONTENT:

{readme_content}
"""

citation = """
TASK:
Analyze the README and extract any citation of the repository or any articles (e.g., BibTeX, DOI, or reference text).
Return only the citation.
If no citation is present, return an empty string.

Output JSON exactly in this format:

{{
    "text": "text"
}}

RULES:

1. Only return the citation text; do not include any other content.
2. If multiple citations exist, return all of them concatenated.
3. If no citation is found, return an empty string ("").
4. Preserve the original formatting of the citation (e.g., BibTeX, DOI, plain text).

INPUT DATA:

{readme}
"""

translate = """
TASK:
Translate the provided README content into the target language.

RULES:

- Translate only natural language parts (titles, descriptions, paragraphs, lists).
- DO NOT translate:
  * project name,
  * code blocks,
  * shell commands,
  * configuration snippets,
  * links, badges, and image references.
- Preserve original Markdown formatting.
- The "suffix" must be the correct ISO 639-1 or common abbreviation of the target language.

OUTPUT FORMAT:
Return a JSON object with the following structure:

{{
    "content": "translated README text",
    "suffix": "short language code (e.g., en, ru, es, fr, de)"
}}

INPUT DATA:

1. TARGET LANGUAGE: {target_language}

2. README CONTENT: {readme_content}
"""
