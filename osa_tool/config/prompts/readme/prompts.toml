# LLM prompts for the README generation agent pipeline.

[prompts]
preanalysis = """
TASK:
Based on the repository file tree and README, select the 4-8 most informative files for downstream README generation.

Select the 4-8 most informative files for downstream README generation.

Selection intent:
- Maximize coverage of purpose, architecture, and usage signals.
- Return files in strict priority order (most informative first).

Prioritize in this order:
1. Runtime entry points and orchestration files (main/app/cli/__main__ scripts)
2. Core modules with primary business logic
3. Configuration/setup manifests (pyproject, setup, package manifests, build files)
4. Representative examples or demos that show real usage patterns

OUTPUT:
Return a JSON object:

{{
    "key_files": [
        "most/important/file.py",
        "second/important/file.py"
    ]
}}

RULES:
- Return 4-8 files, ordered by importance (most important first).
- Each string is a relative path exactly matching a path in the tree.
- Exclude tests, CI-only files, generated artifacts, and README files.
- Prefer files with stable project meaning over incidental utility scripts.
- Return only valid JSON without explanations.

INPUT DATA:

1. REPOSITORY FILE TREE:

{repository_tree}

2. README CONTENT:

{readme_content}
"""

citation = """
TASK:
Extract repository or paper citation material from the README (BibTeX, DOI, reference text, publication block).
If no citation is present, return an empty string.

Output JSON exactly in this format:

{{
    "text": "text"
}}

RULES:

1. Return only citation content (no labels, commentary, or markdown wrappers unless part of citation).
2. If multiple citations exist, include all in source order separated by a blank line.
3. If no citation is found, return an empty string ("").
4. Preserve original citation formatting as closely as possible.

INPUT DATA:

{readme}
"""

repo_analysis = """
TASK:
Analyze repository evidence and produce a compact, evidence-grounded assessment.

Determine the following:
1. **Project type**: ML/AI, CLI tool, library/SDK, web app, data pipeline, or other
2. **Tech stack**: primary language(s), frameworks, key dependencies
3. **Architecture**: monolith, microservices, plugin-based, notebook-based, etc.
4. **Quality signals**: presence of tests, CI/CD, documentation, examples, type hints
5. **Target audience**: researchers, developers, data scientists, end-users

Output a concise synthesis covering all five points.

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

RULES:
- Use only provided evidence; do not infer unsupported frameworks or workflows.
- Distinguish strong evidence from weak hints (use cautious wording when uncertain).
- Prefer concrete observations over generic statements.
- Keep the output compact and scannable.

INPUT DATA:

1. REPOSITORY TREE:

{repository_tree}

2. KEY FILES CONTENT:

{key_files_content}

3. EXISTING README:

{existing_readme}
"""

readme_analysis = """
TASK:
Evaluate the existing README for quality and fitness for developer onboarding.

Assess the following dimensions:
1. **Completeness**: which standard sections exist (overview, installation, usage/getting started, examples, API reference, contributing, license) and which are missing
2. **Accuracy**: does the README reflect the current state of the code (outdated commands, wrong dependencies, etc.)
3. **Clarity**: is the writing clear, well-structured, and easy to scan for developers
4. **Section quality**: for each existing section, rate quality as good/adequate/poor
5. **Gaps**: specific improvements that would have the highest impact

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

RULES:
- Focus on high-impact, actionable findings.
- Flag concrete risk points (outdated commands, ambiguous setup, contradictory claims).
- Avoid generic advice ("add more details") without specifying what and where.
- Stay concise; prioritize issues by impact.

INPUT DATA:

1. EXISTING README:

{existing_readme}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. REPOSITORY TREE:

{repository_tree}
"""

article_analysis = """
TASK:
Analyze the associated scientific article (PDF) for README-relevant signals.

Extract and summarize:
1. **Main contributions**: what novel methods, datasets, or findings does the paper present
2. **Methodology**: key algorithms, experimental setup, evaluation approach
3. **Results**: primary findings and their significance
4. **Code connection**: how well the repository reflects or implements the paper's methodology

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

RULES:
- Separate paper claims from repository evidence; do not assume full parity.
- Avoid copying long paper prose; summarize only README-relevant points.
- Do not invent metrics, datasets, or experimental settings not present in input.
- Keep output concise and implementation-oriented.

INPUT DATA:

1. PDF CONTENT:

{pdf_content}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. EXISTING README:

{existing_readme}
"""

self_eval = """
TASK:
Evaluate the generated README and decide whether to stop or run targeted regeneration.

Assess along these dimensions (no numeric score in your output):
- Completeness: essential sections present for this repo
- Accuracy: matches repository analysis and does not invent facts
- Clarity: readable and scannable for developers
- Structure: sound Markdown and logical flow
- User request alignment: satisfies the user request when one was given

SEVERITY (each issue must use exactly one):
- "blocker": wrong repo, fabricated commands/paths, broken Markdown, contradicts analysis, or fails the user request
- "major": materially misleading, missing critical install/run/API steps that belong in this README, or large clarity gaps
- "minor": typos, wording polish, optional structure tweaks, or small gaps that do not block publication

OUTPUT:
Return a JSON object:

{{
    "issues": [
        {{"severity": "major", "description": "short concrete defect"}},
        {{"severity": "minor", "description": "optional polish item"}}
    ],
    "should_stop": false,
    "sections_to_rerun": [],
    "section_feedback": {{}},
    "quality_notes": "optional one-line summary for logs only"
}}

- "issues": list every **blocker** and **major** defect you find; add **minor** items when useful. Use [] only if
  there are genuinely no defects (rare—assume drafts usually need at least small fixes unless evidence says otherwise).
- "sections_to_rerun": internal section names from **PLANNED SECTION NAMES** below that need regeneration (LLM prose
  sections only, e.g. "overview", "getting_started"). Use [] if a whole-document patch is enough.
- "section_feedback": map section internal name -> short instructions for that section's generator (concrete, actionable).
  Omit keys you do not want to rerun.

Set "should_stop" to true only when:
- "issues" contains **no** "blocker" or "major" entries, **and**
- "sections_to_rerun" is empty (if any section still needs regeneration, list it and set should_stop to false), **and**
- any remaining "minor" issues are optional to fix before publication.

RULES:
- Report issues as concrete defects, not preferences.
- Prefer section reruns only when defects are clearly localized to specific sections.
- If multiple sections repeat the same flaw, mention root cause once and map precise feedback per affected section.
- Never include section names outside PLANNED SECTION NAMES.
- Keep each issue "description" short and actionable.
- If **INTENT SCOPE** is `partial` or **ASSEMBLY MODE** is `merge_existing`, prefer `sections_to_rerun` for
  localized defects; avoid listing whole-document rewrite issues unless the defect is global (broken markdown,
  wrong repository, contradictory title).

INPUT DATA:

1. GENERATED README:

{readme}

2. REPOSITORY ANALYSIS:

{repo_analysis}

3. GENERATION PLAN:

{generation_plan}

4. USER REQUEST (if any):

{user_request}

5. PREVIOUS ISSUES (if any):

{previous_issues}

6. PLANNED SECTION INTERNAL NAMES (for sections_to_rerun only):

{planned_section_names}

7. INTENT SCOPE:

{intent_scope}

8. INTENT TASK TYPE:

{intent_task_type}

9. AFFECTED SECTIONS:

{affected_sections}

10. ASSEMBLY MODE:

{assembly_mode}
"""

refine_with_feedback = """
TASK:
Improve the README based on the specific issues identified during evaluation.

Fix each issue while preserving the overall structure and content that is already good.
Do not rewrite from scratch; make targeted improvements.

OUTPUT:
Return a JSON object:

{{
    "text": "text"
}}

RULES:
- Resolve each listed issue explicitly.
- Preserve accurate content and document structure unless a change is required to fix an issue.
- Remove redundancy and contradictions introduced during prior generation.
- Do not introduce unsupported facts, commands, or claims.
- Keep style and tone consistent with the rest of the README.
- If **INTENT SCOPE** is `partial` or **ASSEMBLY MODE** is `merge_existing`, apply **surgical** edits only:
  do not restructure the whole README, reorder major sections, or rewrite unrelated parts.

INPUT DATA:

1. CURRENT README:

{readme}

2. ISSUES TO FIX:

{issues}

3. GENERATION PLAN:

{generation_plan}

4. USER REQUEST (if any):

{user_request}

5. INTENT SCOPE:

{intent_scope}

6. AFFECTED SECTIONS:

{affected_sections}

7. ASSEMBLY MODE:

{assembly_mode}
"""

intent_analysis = """
TASK:
Analyze the user's request and repository state to determine the intent for README generation.

Based on the inputs below, determine:
1. **task_type**: one of "generate", "improve", or "update"
   - "generate": No README exists, or user asks for a fresh README from scratch
   - "improve": README exists and user wants to enhance it globally (better quality, more sections, etc.)
   - "update": User requests changes to specific sections only
2. **scope**: "full" or "partial"
   - "full": Entire README should be (re)generated or improved
   - "partial": Only specific sections should be modified
3. **affected_sections**: list of section names the user explicitly or implicitly refers to (empty list for full scope)
   - Use descriptive names like "overview", "installation", "getting_started", "api_reference", "benchmarks", etc.
4. **incorporate_paper**: true if a scientific paper/PDF is attached AND relevant to the README
5. **reasoning**: brief explanation of your decision

OUTPUT:
Return a JSON object:

{{
    "task_type": "generate",
    "scope": "full",
    "affected_sections": [],
    "incorporate_paper": false,
    "reasoning": "text"
}}

INPUT DATA:

1. REPOSITORY ANALYSIS:

{repo_analysis}

2. README ANALYSIS:

{readme_analysis}

3. ARTICLE ANALYSIS (if available):

{article_analysis}

4. USER REQUEST (if any):

{user_request}

5. HAS EXISTING README: {has_existing_readme}

6. HAS ATTACHMENT: {has_attachment}

RULES:
- Prioritize explicit user intent over inferred intent.
- Decision table (apply first matching row):
  1) User names specific README sections or a narrow edit (e.g. "fix Usage", "add install step") ->
     `task_type` = "update", `scope` = "partial", fill `affected_sections` with matching internal names
     (overview, installation, getting_started, usage, api_reference, etc.).
  2) User asks to rewrite / regenerate the whole README, or no README exists and they want one ->
     `scope` = "full"; use `task_type` "generate" if no README, else "improve" unless they clearly want
     only specific sections (row 1).
  3) Request is vague but a README exists (e.g. "make it better") ->
     default `task_type` = "improve", `scope` = "full", `affected_sections` = [].
  4) Request is vague and no README exists ->
     default `task_type` = "generate", `scope` = "full", `affected_sections` = [].
- Keep `affected_sections` empty for full-scope tasks.
- Set `incorporate_paper` to true only when a paper exists and is relevant to requested output.
- Keep `reasoning` short, concrete, and evidence-based.
"""

section_planning = """
TASK:
Choose which **LLM-written** README sections to include (a small set - not a textbook).

For **full**-scope runs, the pipeline also schedules deterministic sections (header, table of contents, installation,
examples, documentation, contributing, license, citation) when applicable. For **partial**-scope runs, only
deterministic sections explicitly referenced in **AFFECTED SECTIONS** are scheduled; do not assume every
deterministic block will be rebuilt.

You must **only** pick section **internal names** from the allowed list below. Do **not** output titles,
descriptions, priorities, or prompt_context_keys - the system fills those from a catalog (typically **3-6** names;
rarely more than **7**).

RULES (read carefully):
- Prefer a SHORT README: fewer sections beat exhaustive coverage.
- Do NOT mirror every bullet from README ANALYSIS or any "gaps / recommendations" list as separate section names.
  Those notes are hints for accuracy, not a mandatory checklist.
- Avoid overlap: use EITHER `getting_started` OR `usage`, not both (prefer `getting_started` for runnable entry).
- Do NOT invent names outside the allowed list. If the user asks for FAQ/troubleshooting/changelog, pick the closest
  allowed section or omit it (those names are usually not in the list).
- Do NOT select `benchmarks` unless the repository context contains measured numbers or benchmark-related content.
- Do NOT select `testing` if there is no tests suite, CI config, or test-related signals in the analysis/tree.
- Tailor to the repo: a few scripts and notebooks rarely need `api_reference`, `architecture`, or long Method sections.
- Do NOT pick deterministic-only names (already handled): `header`, `table_of_contents`, `installation`, `examples`,
  `documentation`, `contributing`, `license`, `citation`.
- If a scientific paper is attached and relevant (`incorporate_paper` or strong article analysis), consider `algorithms`
  and/or `content`.
- Prefer sections that improve developer onboarding first (overview/core_features/getting_started or usage).
- For partial updates, select only sections necessary to satisfy the request; do not add extra LLM sections
  for completeness unless the user or **AFFECTED SECTIONS** clearly requires them.

ALLOWED LLM SECTION NAMES (internal snake_case - output **only** these strings in `section_names`):

{llm_section_catalog}

OUTPUT:
Return a JSON object:

{{
    "section_names": ["overview", "core_features", "getting_started"]
}}

INPUT DATA:

1. TASK TYPE: {task_type}
2. SCOPE: {scope}
3. AFFECTED SECTIONS: {affected_sections}
4. INCORPORATE PAPER: {incorporate_paper}

5. REPOSITORY ANALYSIS:

{repo_analysis}

6. README ANALYSIS:

{readme_analysis}

7. ARTICLE ANALYSIS (if available):

{article_analysis}

8. USER REQUEST (if any):

{user_request}

9. EXISTING README SECTIONS (extracted headings):

{existing_sections}
"""

section_generate = """
TASK:
Generate the "{section_title}" section for a README file.

SECTION INTERNAL NAME (use for constraints below): {section_name}

SECTION PURPOSE:
{section_description}

RULES:
- Facts only: describe what exists in the repository context (files, scripts, notebooks, commands that appear
  in the snippets). Do NOT invent CLI flags, paths, filenames, package names, hyperparameters, benchmark numbers,
  or FAQ answers that are not supported by the context.
- If a detail is unknown, omit it or say briefly that users should inspect the listed files - do not guess.
- Write lean Markdown. Do NOT include the section heading (no "## {section_title}") - it is added automatically.
- Do NOT add a nested "FAQ" inside non-FAQ sections.
- Escape any backslashes in JSON strings so the output is valid JSON (double backslashes for Windows paths).
- If improving an existing section, keep accurate facts; drop marketing filler and speculative claims.
- Keep output concise and scannable; avoid repeated claims across paragraphs/bullets.
- Prefer developer-actionable wording. Use concrete repository anchors (paths, symbols, commands) only where
  section-specific rules allow (e.g. getting_started, examples); for overview and core_features, describe
  capabilities without naming source files—follow section-specific constraints below.

SECTION-SPECIFIC CONSTRAINTS (apply when section internal name matches):
- overview: 1-3 short paragraphs only. No bullet lists. Audience: first-scan readers. Do NOT enumerate libraries
  or dependencies by name; you may say "Python" once or refer readers to Installation / requirements. Focus on
  what the repo does; orient readers with capability-level surfaces (CLI, HTTP API, notebooks, training workflows)
  supported by context—without repo paths, parenthetical filenames, or backticked file paths. Defer exact paths to
  Getting Started.
- core_features: at most 5 bullets. Each bullet = one distinct capability plus practical developer value in one
  concise sentence; ground claims only in what context supports, but do NOT cite file names, paths, or
  function/class symbols. Do NOT add bullets that only restate the dependency stack, IDE tooling, type hints,
  "clean code", "rich libraries", persistence alone, or other generic claims.
- getting_started: keep prerequisites short; do not paste a long package list-point to Installation or
  requirements.txt if mentioned in context.

OUTPUT:
Return a JSON object:

{{
    "text": "the section body only, in Markdown"
}}

INPUT DATA:

1. PROJECT NAME: {project_name}

2. REPOSITORY CONTEXT:

{context_block}

3. EXISTING SECTION CONTENT (if improving):

{existing_section}

4. USER REQUEST (if any):

{user_request}

5. REGENERATION FEEDBACK (if not N/A, apply to this section):

{regeneration_hint}
"""

section_overview = """
TASK:
Generate the **Overview** section for a README file.

SECTION INTERNAL NAME: overview

RULES:
- Purpose: explain what the project does, who it is for, and how newcomers orient themselves—without acting as a file index.
- Audience: first-scan readers; where code or scripts live belongs in Getting Started, Examples, or Documentation.
- Length: 1 short paragraph (3-5 sentences), no bullet list.
- Include:
  1) primary project goal/problem,
  2) primary developer audience or use context,
  3) orientation without file names: types of surfaces the repo offers (e.g. CLI, REST API, notebook workflows,
     training or fine-tuning flows) only as supported by context, and/or point readers to Getting Started for
     runnable steps.
- Exclude:
  - feature enumeration (belongs to Core Features),
  - setup or run steps (belongs to Installation / Getting Started),
  - algorithm details (belongs to Methods and algorithms).
- Do NOT name repository files, extensions, or paths (no backticked paths, no parenthetical filenames like (api.py)).
- Style check: BAD: "start with cli_demo.py"; GOOD: "includes a command-line interface for interactive use."
- Do NOT enumerate third-party libraries/dependencies by name (you may mention "Python" once).
- Facts only - no invented paths, commands, files, claims, or performance statements.
- Keep tone neutral and technical (no marketing language).

OUTPUT:
Return a JSON object:

{{
    "text": "the section body only, in Markdown"
}}

Do NOT include a "## Overview" heading - it is added automatically.

